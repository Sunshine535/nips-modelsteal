# T-DART Gate v1 — minimal experiment to validate successor
method_name: "T-DART"
base_model: "Qwen/Qwen2.5-0.5B"
teacher_checkpoint_path: "teachers/delta_teacher_v1"
reference_model_name: "Qwen/Qwen2.5-0.5B"
student_init: "reference_model"
topk: 20
max_probe_tokens_per_prompt: 64
K_student: 20
K_reference: 20
num_steps: 5000
batch_size: 8
seq_len: 128
finetune_steps: 500
finetune_lr: 0.00005
eval_every: 500
eval_batches: 50
seeds: [0, 1, 2]
perturb_std: 0.0
lambda_ce: 0.3
lambda_rank: 0.5
lambda_delta: 0.2
lambda_cons: 0.0
min_margin: 0.1
variants:
  - ce_only
  - strict_topk_kd
  - bild_topk_delta
  - tdart_no_adaptive
  - tdart_full
  - full_logit_upper
