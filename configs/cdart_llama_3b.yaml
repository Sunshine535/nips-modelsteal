# C-DART Phase 1: Llama-3.2-3B cross-architecture validation
method_name: "C-DART"
base_model: "meta-llama/Llama-3.2-3B"
teacher_checkpoint_path: "teachers/llama_3.2_3b_v1"
reference_model_name: "meta-llama/Llama-3.2-3B"
student_init: "reference_model"
topk: 20
max_probe_tokens_per_prompt: 0
K_student: 20
K_reference: 20
num_steps: 5000
batch_size: 4
seq_len: 128
lr: 0.00001
finetune_steps: 500
finetune_lr: 0.00003
eval_every: 500
eval_batches: 50
perturb_std: 0.0
lambda_ce: 0.3
lambda_rank: 0.3
lambda_delta: 0.2
lambda_censor: 0.2
min_margin: 0.1
variants:
  - ce_only
  - strict_topk_kd
  - bild_topk_delta
  - tdart_no_adaptive
  - cdart_no_censor
  - cdart_full
  - full_logit_upper
