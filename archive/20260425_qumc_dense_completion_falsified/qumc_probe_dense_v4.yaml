# v4: Root cause fix — bypass garbage Carlini basis, test probe-dense KD directly
# Key hypothesis: the 2000 probe logits ARE the useful signal, not the completion
# If probe_dense_kd >> strict_topk_kd AND probe_dense_kd >> ce_only,
# then probe expansion (not completion) is the real mechanism.
model_name: "Qwen/Qwen2.5-0.5B"
num_steps: 5000
batch_size: 8
seq_len: 128
lr: 0.00002
kd_temp: 2.0
kd_alpha: 0.7
topk: 20
probe_tokens: 2000
heldout_probe_tokens: 500
cal_examples: 200
carlini_examples: 100
eval_every: 500
eval_batches: 50
perturb_std: 0.01
max_probe_budget: -1
basis_source: "carlini_recovered"
variants:
  - ce_only
  - strict_topk_kd
  - probe_dense_kd
  - completion_uncertainty_strict
  - full_logit_upper
